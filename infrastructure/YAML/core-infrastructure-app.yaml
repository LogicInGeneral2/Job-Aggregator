apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-databases
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/LogicInGeneral2/Job-Aggregator.git'
    path: infrastructure/YAML/Core
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true