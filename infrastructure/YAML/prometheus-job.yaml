apiVersion: v1
kind: Service
metadata:
  name: job-worker-metrics
  namespace: data-pipeline
  labels:
    app: job-worker
spec:
  selector:
    app: job-worker
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: job-worker-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: job-worker
  namespaceSelector:
    matchNames:
      - data-pipeline
  endpoints:
  - port: metrics
    interval: 10s
